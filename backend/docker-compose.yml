services:
  postgres:
    image: postgres:16
    container_name: asimov_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: asimov
      POSTGRES_PASSWORD: asimov123
      POSTGRES_DB: asimov_associates
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
